name: task-flow-file
version: "1.0.0"
description: >
  Per-file flow for the diverge-converge workflow. Builds ONE file against its
  planner-supplied contract on a sub-branch off the change branch, then merges
  back into the change branch. Cross-file tests, the test_coverage ratchet, and
  the model code/security/devops reviews are deferred to convergence; typecheck
  runs inside the implementation loop and resolves because this file's
  dependencies were merged into the change branch before it.
trigger:
  condition: "task_type == 'change_file'"

context:
  repo_required: true
  branch_strategy: "file-subbranch"

steps:
  - name: checkout_file_branch
    type: GitOperationStep
    description: "Sub-branch off the change branch for exactly one file"
    config:
      operation: "checkoutBranchFromBase"
      baseBranch: "${changeBranch}"
      newBranch: "${fileBranch}"

  - name: mark_task_in_progress
    type: SimpleTaskStatusStep
    depends_on: ["checkout_file_branch"]
    config:
      status: "in_progress"

  - name: context_scan
    type: ContextStep
    depends_on: ["mark_task_in_progress"]
    config:
      repoPath: "${repo_root}"
      includePatterns: ["**/*"]
      excludePatterns:
        - "node_modules/**"
        - ".git/**"
        - "dist/**"
        - "build/**"
        - ".ma/context/**"
        - ".ma/planning/**"
      maxFiles: 1000
      maxBytes: 10485760
      maxDepth: 10
      trackLines: true
      trackHash: false
      forceRescan: ${force_rescan || false}

  - name: implementation_loop
    type: ImplementationLoopStep
    description: "Build the single contracted file; typecheck is enforced inside the loop"
    depends_on: ["context_scan"]
    config:
      maxAttempts: 3
      implementationTemplate: "implementation"
      continueOnStageFailure: false
      diffConfig:
        commit_message: "feat: ${taskName}"
      planGuard:
        additional_files: "${task.files || []}"
        additional_files_variable: "qa_required_files"

  - name: collect_file_diff
    type: GitDiffExportStep
    depends_on: ["implementation_loop"]
    config:
      repoPath: "${repo_root}"
      branch: "${fileBranch}"
      baseBranch: "${changeBranch}"
      output_prefix: "review_diff"
      max_bytes: 200000
      fail_on_empty_diff: false

  - name: file_local_review
    type: DeterministicReviewStep
    description: "File-local rules only; no test_coverage, no cross-file checks"
    depends_on: ["collect_file_diff"]
    outputs: [qa_request_result, qa_request_status]
    config:
      review_type: "qa"
      output_prefix: "qa_request"
      changed_files: "${review_diff_files || []}"
      added_files: "${review_diff_added_files || []}"
      block_on: ["severe", "high"]
      rules:
        - id: "conflict_markers"
          severity: "severe"
        - id: "secret_scan"
          severity: "severe"
        - id: "file_size"
          max_lines: 600
          warn_lines: 400
          severity: "high"
          warn_severity: "medium"
        - id: "method_size"
          max_lines: 120
          severity: "high"

  - name: merge_to_change_branch
    type: GitOperationStep
    description: "Merge the file sub-branch back into the change branch (never main)"
    depends_on: ["file_local_review"]
    condition: "${qa_request_status} == 'pass'"
    config:
      operation: "mergeBranchToMain"
      sourceBranch: "${fileBranch}"
      targetBranch: "${changeBranch}"

  - name: mark_task_done
    type: SimpleTaskStatusStep
    depends_on: ["merge_to_change_branch"]
    condition: "${qa_request_status} == 'pass'"
    config:
      task_id: "${taskId}"
      project_id: "${projectId}"
      status: "done"

  - name: handle_file_review_failure
    type: SubWorkflowStep
    depends_on: ["file_local_review"]
    condition: "${qa_request_status} != 'pass'"
    config:
      workflow: "review-failure-handling"
      inputs:
        review_type: "qa"
        review_result: "${qa_request_result}"
        review_status: "${qa_request_status}"
        task: ${task}
        parent_task_id: "${taskId}"
        config:
          block_original_task: true

failure_handling:
  on_workflow_failure:
    - name: mark_task_blocked
      type: SimpleTaskStatusStep
      config:
        status: "blocked"
        task_id: "${taskId}"
        project_id: "${projectId}"
