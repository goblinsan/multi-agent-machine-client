name: "task-flow"
description: "Consolidated task processing workflow with unified review feedback loops and TDD awareness"
version: "3.0.0"
trigger:
  condition: "task_type == 'task' || task_type == 'feature'"
context:
  repo_required: true
  branch_strategy: "feature-branch"

steps:
  - name: checkout_branch
    type: GitOperationStep
    description: "Checkout feature branch from base branch using milestone slug from dashboard"
    config:
      operation: "checkoutBranchFromBase"
      baseBranch: "main"
      newBranch: "${featureBranchName}"

  - name: mark_task_in_progress
    type: SimpleTaskStatusStep
    description: "Mark task as in progress on dashboard"
    depends_on: ["checkout_branch"]
    config:
      status: "in_progress"

  - name: context_scan
    type: ContextStep
    description: "Scan repository structure and create context snapshot"
    depends_on: ["mark_task_in_progress"]
    config:
      repoPath: "${repo_root}"
      includePatterns: ["**/*"]
      excludePatterns:
        - "node_modules/**"
        - ".git/**"
        - "dist/**"
        - "build/**"
        - ".ma/context/**"
        - ".ma/planning/**"
      maxFiles: 1000
      maxBytes: 10485760
      maxDepth: 10
      trackLines: true
      trackHash: false
      forceRescan: ${force_rescan || false}

  - name: load_previous_qa_feedback
    type: QAArtifactLoadStep
    description: "Load last QA review artifact for planners"
    depends_on: ["context_scan"]
    config:
      artifact_name: "qa"
      output_variable: "qa_previous_result"
      allow_missing: true

  - name: derive_qa_required_files
    type: VariableResolutionStep
    description: "Expose QA-required file hints for guardrails"
    depends_on: ["load_previous_qa_feedback"]
    config:
      variables:
        qa_required_files: "${qa_previous_result.required_files}"

  - name: task_reality_audit
    type: TaskRealityAuditStep
    description: "Audit whether the task is already resolved or obsolete before spending persona cycles"
    depends_on: ["derive_qa_required_files"]
    config:
      run_typecheck: true
      run_tests: false
      timeout_ms: 60000
      update_task_status: true
      resolved_status: "completed"

  - template: context_analysis
    name: context_request
    depends_on: ["task_reality_audit"]
    condition: ${context_scan.analysis_required} == true

  - name: publish_context_analysis
    type: PublishProjectArtifactStep
    description: "Persist the context analysis so unchanged repos can reuse it"
    depends_on: ["context_request"]
    condition: ${context_scan.analysis_required} == true
    config:
      source_variable: "context_request_result"
      kind: "context_analysis"
      allow_missing: true

  - name: load_existing_tasks
    type: FetchProjectTasksStep
    description: "Load dashboard tasks for duplicate detection and validation"
    depends_on: ["context_scan"]
    config:
      project_id: "${projectId}"
      include_completed: false
      store_variable: review_existing_tasks

  - name: baseline_health_synthesis
    type: BaselineHealthSynthesisStep
    description: "Synthesize repair tasks for pre-existing compile errors on the base branch"
    depends_on: ["context_scan"]
    condition: "${baseline_compile_errors.length} > 0"
    config:
      max_tasks: 5
      priority: "high"
      labels:
        - "baseline-health"
        - "auto"

  - name: create_baseline_repair_tasks
    type: BulkTaskCreationStep
    description: "Upsert baseline repair tasks so the repo trends toward a green base"
    depends_on: ["baseline_health_synthesis", "load_existing_tasks"]
    condition: "${baseline_health_synthesis.repair_task_count} > 0"
    config:
      project_id: "${projectId}"
      tasks: "${baseline_health_synthesis.repair_tasks || []}"
      priority_mapping:
        critical: 1500
        high: 1200
        medium: 800
        low: 50
      options:
        upsert_by_external_id: true
        check_duplicates: true
        existing_tasks: "${review_existing_tasks || []}"
        duplicate_match_strategy: "external_id"

  - name: research_enrichment
    type: SubWorkflowStep
    description: "Researcher persona gathers blocking information before planning"
    depends_on: ["context_scan", "load_previous_qa_feedback"]
    config:
      workflow: "task-research"
      inputs:
        task: ${task}
        project_id: "${projectId}"
        project_name: "${projectName}"
        repo: "${repo_remote}"
        repo_root: "${repo_root}"
        milestone: "${milestone}"
        context_summary_md: "${context_summary_md || ''}"
        context_insights: "${context_insights || {}}"
        context_allowed_languages: "${context_allowed_languages || []}"
        context_snapshot_json: "${context_snapshot_json || ''}"
        context_files_ndjson: "${context_files_ndjson || ''}"
        context_snapshot_path: "${context_snapshot_path || ''}"
        context_files_ndjson_path: "${context_files_ndjson_path || ''}"
        repoScan: "${repoScan || []}"
        research_objectives: "${task.research_objectives || []}"
        existing_findings: "${task.research_notes || []}"
        previous_qa_result: "${qa_previous_result || null}"
        qa_required_files: "${qa_required_files || []}"

  - name: planning_loop
    type: PlanningLoopStep
    description: "Plan creation and evaluation loop with max 4 iterations"
    depends_on: ["context_scan", "research_enrichment", "load_previous_qa_feedback"]
    config:
      maxIterations: 4
      plannerPersona: "implementation-planner"
      planStep: "2-plan"
      evaluateStep: "2.5-evaluate-plan"
      payload:
        task: ${task}
        repo: "${repo_remote}"
        repo_root: "${repo_root}"
        project_id: "${projectId}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        research_status: "${research_enrichment.research_status || 'skipped'}"
        research_summary: "${research_enrichment.research_summary || ''}"
        research_next_actions: "${research_enrichment.research_next_actions || []}"
        research_findings: "${research_enrichment.research_findings || []}"
        research_information_blocks: "${research_enrichment.research_information_blocks || []}"
        previous_qa_result: "${qa_previous_result || null}"
        qa_required_files: "${qa_required_files || []}"

  - name: record_plan_key_files
    type: PlanKeyFileGuardStep
    description: "Record plan-required files for implementation prompts"
    depends_on: ["planning_loop"]
    config:
      plan_step: "planning_loop"
      plan_files_variable: "planning_loop_plan_files"
      auto_create_missing: false
      fail_on_missing: false
      record_variable: "plan_required_files"
      additional_files_variable: "qa_required_files"

  - name: scope_viability
    type: ScopeViabilityStep
    description: "Detect plans that cannot pass global validation within their approved file scope"
    depends_on: ["record_plan_key_files"]
    config:
      plan_files_variable: "plan_required_files"
      timeout_ms: 120000
      fail_on_scope_expansion: false

  - name: scope_expansion_planning_loop
    type: PlanningLoopStep
    description: "Regenerate the plan when deterministic validation proves the original scope is insufficient"
    depends_on: ["scope_viability"]
    condition: "scope_viability_status == 'requires_scope_expansion'"
    config:
      maxIterations: 2
      plannerPersona: "implementation-planner"
      planStep: "2-plan-scope-expansion"
      evaluateStep: "2.5-evaluate-scope-expansion-plan"
      payload:
        task: ${task}
        repo: "${repo_remote}"
        repo_root: "${repo_root}"
        project_id: "${projectId}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        research_status: "${research_enrichment.research_status || 'skipped'}"
        research_summary: "Deterministic scope viability rejected the previous plan. The expanded plan must address these root-cause files: ${scope_viability_root_cause_files}. Downstream blocked files: ${scope_viability_blocked_files}."
        research_next_actions: "${research_enrichment.research_next_actions || []}"
        research_findings: "${research_enrichment.research_findings || []}"
        research_information_blocks: "${research_enrichment.research_information_blocks || []}"
        previous_qa_result: "${qa_previous_result || null}"
        qa_required_files: "${qa_required_files || []}"
        scope_viability: "${scope_viability || {}}"
        scope_viability_required_files: "${scope_viability_root_cause_files || []}"
        scope_viability_blocked_files: "${scope_viability_blocked_files || []}"

  - name: record_scope_expansion_plan_key_files
    type: PlanKeyFileGuardStep
    description: "Record expanded plan files after deterministic scope recovery"
    depends_on: ["scope_expansion_planning_loop"]
    condition: "scope_viability_status == 'requires_scope_expansion'"
    config:
      plan_step: "scope_expansion_planning_loop"
      plan_files_variable: "scope_expansion_plan_files"
      auto_create_missing: false
      fail_on_missing: false
      record_variable: "plan_required_files"
      additional_files_variable: "scope_viability_root_cause_files"

  - name: select_original_implementation_plan
    type: VariableResolutionStep
    description: "Use the original plan when deterministic scope is viable"
    depends_on: ["scope_viability"]
    condition: "scope_viability_status != 'requires_scope_expansion'"
    config:
      variables:
        implementation_plan_step: "planning_loop"

  - name: select_expanded_implementation_plan
    type: VariableResolutionStep
    description: "Use the regenerated scope-expanded plan for implementation"
    depends_on: ["record_scope_expansion_plan_key_files"]
    condition: "scope_viability_status == 'requires_scope_expansion'"
    config:
      variables:
        implementation_plan_step: "scope_expansion_planning_loop"
        planning_loop_plan_files: "${scope_expansion_plan_files}"

  - name: implementation_loop
    type: ImplementationLoopStep
    description: "Retry implementation edits until plan-required files exist"
    depends_on: ["select_original_implementation_plan", "select_expanded_implementation_plan"]
    config:
      maxAttempts: 3
      implementationTemplate: "implementation"
      continueOnStageFailure: true
      diffConfig:
        commit_message: "feat: implement ${taskName}"
      planGuard:
        plan_step: "planning_loop"
        plan_files_variable: "planning_loop_plan_files"
        additional_files: "${record_plan_key_files.key_files || []}"
        additional_files_variable: "qa_required_files"

  - name: context_rescan
    type: ContextStep
    description: "Recalculate repository context and diagnostics after edits are made"
    depends_on: ["implementation_loop"]
    config:
      forceRescan: true

  - name: determine_test_entrypoint
    type: TestCommandDiscoveryStep
    description: "Detect or enforce presence of a runnable test command before QA"
    depends_on: ["context_rescan"]
    config:
      variable: "detected_test_command"
      require_command: false
      package_script_priority: ["test:regression", "test:ci", "test"]
      allow_makefile: true

  - name: bootstrap_test_tooling
    type: TestToolingSetupStep
    description: "Install or repair node-based test tooling before running tests"
    depends_on: ["determine_test_entrypoint"]
    condition: "detected_test_command.length > 0"
    config:
      testCommandVariable: "detected_test_command"
      ensureDevDependencies: ["vitest"]
      skipInstallWhenNodeModulesPresent: true

  - name: run_detected_tests
    type: QAStep
    description: "Execute detected test command so QA persona receives actionable output"
    depends_on: ["bootstrap_test_tooling"]
    condition: "detected_test_command.length > 0"
    config:
      testCommand: "${detected_test_command}"
      retryCount: 1
      skipOnNoTests: true
      failureThreshold: 0
      softFail: true

  - name: persist_pre_qa_test_signal
    type: VariableResolutionStep
    description: "Surface detected test execution results for downstream personas"
    depends_on: ["run_detected_tests"]
    condition: "detected_test_command.length > 0"
    config:
      variables:
        pre_qa_test_result: "${run_detected_tests.qaResult}"
        pre_qa_test_status: "${run_detected_tests.testsPassed}"
        pre_qa_test_error: "${run_detected_tests.error}"

  - name: pre_qa_auto_repair
    type: PreQaAutoRepairStep
    description: "Attempt to auto-repair syntax errors before escalating to QA cascade"
    depends_on: ["persist_pre_qa_test_signal"]
    condition: "pre_qa_test_error.length > 0"
    config:
      maxRepairAttempts: 2
      testTimeoutMs: 120000
      testIdleTimeoutMs: 30000

  - name: run_project_validation
    type: QAStep
    description: "Collect project validation regressions with typecheck plus detected tests before final hard gate"
    depends_on: ["pre_qa_auto_repair"]
    condition: "detected_test_command.length > 0"
    config:
      testCommand: "${detected_test_command}"
      retryCount: 0
      skipOnNoTests: true
      failureThreshold: 0
      softFail: true

  - name: persist_project_validation_signal
    type: VariableResolutionStep
    description: "Surface project validation regressions for deterministic post-validation repair"
    depends_on: ["run_project_validation"]
    condition: "detected_test_command.length > 0"
    config:
      variables:
        project_validation_result: "${run_project_validation.qaResult}"
        project_validation_status: "${run_project_validation.testsPassed}"
        project_validation_error: "${run_project_validation.errorText}"
        project_validation_failure_files: "${run_project_validation.failureFiles || []}"

  - name: post_project_validation_auto_repair
    type: PreQaAutoRepairStep
    description: "Attempt deterministic repairs for parseable final validation regressions"
    depends_on: ["persist_project_validation_signal"]
    condition: "project_validation_error.length > 0"
    config:
      sourceErrorVariable: "project_validation_error"
      clearErrorVariable: "project_validation_error"
      maxRepairAttempts: 2
      testTimeoutMs: 120000
      testIdleTimeoutMs: 30000

  - name: rerun_project_validation
    type: QAStep
    description: "Hard gate project validation after any deterministic repair"
    depends_on: ["post_project_validation_auto_repair"]
    condition: "detected_test_command.length > 0"
    config:
      testCommand: "${detected_test_command}"
      retryCount: 0
      skipOnNoTests: true
      failureThreshold: 0
      softFail: false

  - name: test_harness_synthesis
    type: TestHarnessSynthesisStep
    description: "Synthesize deterministic test harness tasks when no entrypoint exists"
    depends_on: ["determine_test_entrypoint"]
    condition: "detected_test_command.length == 0"
    config:
      detection_variable: "detected_test_command"
      repo_root: "${repo_root}"
      labels:
        - "qa-gap"
        - "needs-tests"
        - "auto"

  - name: create_test_harness_tasks
    type: BulkTaskCreationStep
    description: "Create follow-up tasks so QA gains a runnable harness"
    depends_on: ["test_harness_synthesis", "load_existing_tasks"]
    condition: "test_harness_required == true"
    config:
      project_id: "${projectId}"
      tasks: "${test_harness_synthesis.harness_tasks || []}"
      priority_mapping:
        critical: 1500
        high: 1200
        medium: 800
        low: 50
      options:
        upsert_by_external_id: true
        external_id_template: "test-harness-${task.id}"
        check_duplicates: true
        existing_tasks: "${review_existing_tasks || []}"
        duplicate_match_strategy: "content_hash"

  - name: collect_test_harness_dependencies
    type: DependencyTaskCollectorStep
    description: "Collect harness follow-up ids for dependency wiring"
    depends_on: ["create_test_harness_tasks"]
    condition: "test_harness_required == true"
    config:
      primary_ids: "${create_test_harness_tasks.task_ids || []}"
      duplicate_ids: "${create_test_harness_tasks.duplicate_task_ids || []}"
      output_variable: "test_harness_dependency_ids"

  - name: register_test_harness_dependencies
    type: RegisterBlockedDependenciesStep
    description: "Link harness follow-ups as blocking dependencies"
    depends_on: ["collect_test_harness_dependencies"]
    condition: "test_harness_required == true && collect_test_harness_dependencies.dependency_task_ids.length > 0"
    config:
      project_id: "${projectId}"
      parent_task_id: "${task.id}"
      dependency_task_ids: "${collect_test_harness_dependencies.dependency_task_ids}"

  - name: mark_task_blocked_pending_harness
    type: SimpleTaskStatusStep
    description: "Block original task until a runnable test harness exists"
    depends_on: ["register_test_harness_dependencies"]
    condition: "test_harness_required == true && register_test_harness_dependencies.dependencyCount > 0"
    config:
      status: "blocked"
      comment: "Missing runnable test command - follow-up harness task created"
      task_id: "${taskId}"
      project_id: "${projectId}"

  - name: sync_branch_with_base
    type: GitOperationStep
    description: "Merge the base branch into the feature branch when base has advanced since this branch forked"
    depends_on: ["rerun_project_validation"]
    condition: "test_harness_required != true"
    config:
      operation: "syncBranchWithBase"
      branch: "${branch}"
      baseBranch: "${baseBranch || 'main'}"

  - name: merge_preflight_validation
    type: QAStep
    description: "PR-style gate on the merged tree, only when the base branch brought in new commits"
    depends_on: ["sync_branch_with_base"]
    condition: "merge_preflight_required == true && detected_test_command.length > 0"
    config:
      testCommand: "${detected_test_command}"
      retryCount: 0
      skipOnNoTests: true
      failureThreshold: 0
      softFail: false

  - name: verify_diff
    type: GitOperationStep
    description: "Verify remote branch has diff from base"
    depends_on: ["merge_preflight_validation"]
    condition: "test_harness_required != true"
    config:
      operation: "verifyRemoteBranchHasDiff"

  - name: ensure_branch_published
    type: GitOperationStep
    description: "Ensure branch is published to remote before code reviews"
    depends_on: ["verify_diff"]
    config:
      operation: "ensureBranchPublished"

  - name: collect_review_diff
    type: GitDiffExportStep
    description: "Export current diff summary for PM validation"
    depends_on: ["ensure_branch_published"]
    config:
      repoPath: "${repo_root}"
      branch: "${featureBranchName}"
      baseBranch: "${baseBranch || 'main'}"
      output_prefix: "review_diff"
      max_bytes: 200000
      fail_on_empty_diff: false

  - name: mutation_test
    type: MutationTestStep
    description: "Advisory: do the tests actually constrain the changed code, or only run it?"
    depends_on: ["collect_review_diff"]
    condition: "detected_test_command.length > 0"
    config:
      output_prefix: "mutation"
      testCommand: "${detected_test_command}"
      changed_files: "${review_diff_files || []}"
      max_files: 3
      max_mutants_per_file: 8
      mutant_timeout_ms: 120000
      severity: "medium"
      block_on_survivors: false
      exclude:
        - "scripts/*"
        - "tests/*"
        - "*.config.*"

  - template: qa_review
    name: qa_request
    depends_on: ["collect_review_diff", "mutation_test"]

  - name: cache_latest_qa_review
    type: VariableResolutionStep
    description: "Cache QA artifacts for future planning iterations"
    depends_on: ["qa_request"]
    config:
      variables:
        qa_previous_result: "${qa_request_result}"
        qa_previous_status: "${qa_request_status}"
        qa_required_files: "${qa_request_result.required_files || qa_required_files}"

  - name: commit_qa_result
    type: GitArtifactStep
    description: "Commit QA review result to .ma/tasks/{id}/reviews/qa.json"
    depends_on: ["qa_request", "cache_latest_qa_review"]
    config:
      source_output: "qa_request_result"
      artifact_path: ".ma/tasks/${task.id}/reviews/qa.json"
      commit_message: "test(ma): QA review for task ${task.id}"
      format: "json"
      require_push: true

  - name: handle_qa_failure
    type: SubWorkflowStep
    description: "PM prioritization and bulk task creation for QA failures (unified pattern)"
    depends_on: ["qa_request", "load_existing_tasks"]
    condition: "${qa_request_status} != 'pass'"
    config:
      workflow: "review-failure-handling"
      inputs:
        review_type: "qa"
        review_result: "${qa_request_result}"
        review_status: "${qa_request_status}"
        pre_qa_test_error: "${pre_qa_test_error || ''}"
        milestone_context: "${milestone}"
        task: ${task}
        parent_task_id: "${taskId}"
        priority_scores:
          urgent: 1200
          deferred: 50
        config:
          block_original_task: true
        project_id: "${projectId}"
        repo_root: "${repo_root}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        repo: "${repo_remote}"
        tdd_aware: "${tdd_aware || false}"
        tdd_stage: "${tdd_stage || 'implementation'}"
        existing_tasks: "${review_existing_tasks || []}"
        diff_summary: "${review_diff_summary || ''}"
        diff_changed_files: "${review_diff_files || []}"

  - name: mark_task_in_review
    type: SimpleTaskStatusStep
    description: "Mark task as in review on dashboard when QA passes"
    depends_on: ["qa_request"]
    condition: "${qa_request_status} == 'pass'"
    config:
      status: "in_review"

  - name: code_review_request
    type: DeterministicReviewStep
    description: "Run configurable deterministic code review gates"
    depends_on: ["mark_task_in_review"]
    condition: "${qa_request_status} == 'pass'"
    outputs: [code_review_request_result, code_review_request_status]
    config:
      review_type: "code_review"
      output_prefix: "code_review_request"
      changed_files: "${review_diff_files || []}"
      block_on: ["severe", "high"]
      rules:
        - id: "conflict_markers"
          severity: "severe"
        - id: "file_size"
          max_lines: 600
          warn_lines: 400
          severity: "high"
          warn_severity: "medium"
        - id: "method_size"
          max_lines: 100
          severity: "high"
        - id: "duplicate_code"
          min_lines: 8
          severity: "medium"
        - id: "forbidden_comments"
          enabled: false
          severity: "medium"

  - name: commit_code_review_result
    type: GitArtifactStep
    description: "Commit code review result to .ma/tasks/{id}/reviews/code-review.json"
    depends_on: ["code_review_request"]
    condition: "${qa_request_status} == 'pass'"
    config:
      source_output: "code_review_request_result"
      artifact_path: ".ma/tasks/${task.id}/reviews/code-review.json"
      commit_message: "refactor(ma): code review for task ${task.id}"
      format: "json"

  - name: handle_code_review_failure
    type: SubWorkflowStep
    description: "PM prioritization and bulk task creation for code review failures"
    depends_on: ["code_review_request", "load_existing_tasks"]
    condition: "${code_review_request_status} == 'fail'"
    config:
      workflow: "review-failure-handling"
      inputs:
        review_type: "code_review"
        review_result: "${code_review_request_result}"
        review_status: "${code_review_request_status}"
        milestone_context: "${milestone}"
        task: ${task}
        parent_task_id: "${taskId}"
        priority_scores:
          urgent: 1000
          deferred: 50
        config:
          block_original_task: true
        project_id: "${projectId}"
        repo_root: "${repo_root}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        repo: "${repo_remote}"
        tdd_aware: "${tdd_aware || false}"
        tdd_stage: "${tdd_stage || 'implementation'}"
        existing_tasks: "${review_existing_tasks || []}"
        diff_summary: "${review_diff_summary || ''}"
        diff_changed_files: "${review_diff_files || []}"
      outputs:
        urgent_tasks_created: "${create_tasks_bulk.urgent_tasks_created || 0}"

  - name: resolve_code_review_override
    type: VariableResolutionStep
    description: "Override code review fail status when no blocking tasks were created"
    depends_on: ["handle_code_review_failure"]
    condition: "${handle_code_review_failure.urgent_tasks_created} == 0"
    config:
      variables:
        code_review_request_status: "resolved"

  - name: security_request
    type: DeterministicReviewStep
    description: "Run deterministic security scan (secret detection) on changed files"
    depends_on: ["code_review_request"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail'"
    outputs: [security_request_result, security_request_status]
    config:
      review_type: "security"
      output_prefix: "security_request"
      changed_files: "${review_diff_files || []}"
      block_on: ["severe", "high"]
      rules:
        - id: "secret_scan"
          severity: "severe"

  - name: commit_security_result
    type: GitArtifactStep
    description: "Commit security review result to .ma/tasks/{id}/reviews/security.json"
    depends_on: ["security_request"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail'"
    config:
      source_output: "security_request_result"
      artifact_path: ".ma/tasks/${task.id}/reviews/security.json"
      commit_message: "security(ma): security review for task ${task.id}"
      format: "json"

  - name: handle_security_failure
    type: SubWorkflowStep
    description: "PM prioritization and bulk task creation for security failures"
    depends_on: ["security_request", "load_existing_tasks"]
    condition: "${security_request_status} == 'fail'"
    config:
      workflow: "review-failure-handling"
      inputs:
        review_type: "security_review"
        review_result: "${security_request_result}"
        review_status: "${security_request_status}"
        milestone_context: "${milestone}"
        task: ${task}
        parent_task_id: "${taskId}"
        priority_scores:
          urgent: 1500
          deferred: 50
        config:
          block_original_task: true
        project_id: "${projectId}"
        repo_root: "${repo_root}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        repo: "${repo_remote}"
        tdd_aware: "${tdd_aware || false}"
        tdd_stage: "${tdd_stage || 'implementation'}"
        existing_tasks: "${review_existing_tasks || []}"
        diff_summary: "${review_diff_summary || ''}"
        diff_changed_files: "${review_diff_files || []}"
      outputs:
        urgent_tasks_created: "${create_tasks_bulk.urgent_tasks_created || 0}"

  - name: resolve_security_override
    type: VariableResolutionStep
    description: "Override security fail status when no blocking tasks were created"
    depends_on: ["handle_security_failure"]
    condition: "${handle_security_failure.urgent_tasks_created} == 0"
    config:
      variables:
        security_request_status: "resolved"

  - template: devops_review
    name: devops_request
    depends_on: ["security_request"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail' && ${security_request_status} != 'fail'"

  - name: commit_devops_result
    type: GitArtifactStep
    description: "Commit DevOps review result to .ma/tasks/{id}/reviews/devops.json"
    depends_on: ["devops_request"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail' && ${security_request_status} != 'fail'"
    config:
      source_output: "devops_request_result"
      artifact_path: ".ma/tasks/${task.id}/reviews/devops.json"
      commit_message: "ci(ma): DevOps review for task ${task.id}"
      format: "json"

  - name: handle_devops_failure
    type: SubWorkflowStep
    description: "PM prioritization and bulk task creation for DevOps failures"
    depends_on: ["devops_request"]
    condition: "${devops_request_status} == 'fail'"
    config:
      workflow: "review-failure-handling"
      inputs:
        review_type: "devops_review"
        review_result: "${devops_request_result}"
        review_status: "${devops_request_status}"
        milestone_context: "${milestone}"
        task: ${task}
        parent_task_id: "${taskId}"
        priority_scores:
          urgent: 1100
          deferred: 50
        config:
          block_original_task: true
        project_id: "${projectId}"
        repo_root: "${repo_root}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"
        repo: "${repo_remote}"
        tdd_aware: "${tdd_aware || false}"
        tdd_stage: "${tdd_stage || 'implementation'}"
        existing_tasks: []
        diff_summary: "${review_diff_summary || ''}"
        diff_changed_files: "${review_diff_files || []}"
      outputs:
        urgent_tasks_created: "${create_tasks_bulk.urgent_tasks_created || 0}"

  - name: resolve_devops_override
    type: VariableResolutionStep
    description: "Override devops fail status when no blocking tasks were created"
    depends_on: ["handle_devops_failure"]
    condition: "${handle_devops_failure.urgent_tasks_created} == 0"
    config:
      variables:
        devops_request_status: "resolved"

  - name: mark_task_done
    type: SimpleTaskStatusStep
    description: "Mark task as completed on dashboard when all reviews pass"
    depends_on: ["merge_branch_to_main"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail' && ${security_request_status} != 'fail' && ${devops_request_status} != 'fail'"
    config:
      task_id: "${taskId}"
      project_id: "${projectId}"
      status: "done"

  - name: merge_branch_to_main
    type: GitOperationStep
    description: "Merge feature branch back to main so subsequent tasks see completed work"
    depends_on: ["devops_request"]
    condition: "${qa_request_status} == 'pass' && ${code_review_request_status} != 'fail' && ${security_request_status} != 'fail' && ${devops_request_status} != 'fail'"
    config:
      operation: "mergeBranchToMain"
      sourceBranch: "${branch}"
      targetBranch: "main"

  - name: check_milestone_completion
    type: MilestoneStatusCheckStep
    description: "Check if milestone has remaining incomplete tasks"
    depends_on: ["merge_branch_to_main"]
    config:
      check_type: "incomplete_tasks"
      include_cancelled: false

  - name: pm_evaluate_suggestions
    type: PersonaRequestStep
    description: "Send suggested tasks to PM for urgency evaluation"
    depends_on: ["check_milestone_completion"]
    condition: "${milestone_has_remaining_tasks} == true"
    config:
      step: "6-pm-evaluate-suggestions"
      persona: "project-manager"
      intent: "evaluate_task_urgency"
      payload:
        milestone: "${milestone}"
        completed_task: ${task}
        remaining_tasks: "${check_milestone_completion_remaining_tasks}"
        suggested_tasks: "${qa_iteration_loop_suggested_tasks}"
        milestone_completion_percentage: "${milestone_completion_percentage}"
        repo: "${repo_remote}"
        project_id: "${projectId}"
        repo_root: "${repo_root}"
        repo_slug: "${repoSlug}"
        project_name: "${projectName}"

failure_handling:
  on_workflow_failure:
    - name: mark_task_blocked
      type: SimpleTaskStatusStep
      description: "Mark task as blocked when workflow fails"
      config:
        status: "blocked"

timeouts:
  context_request_timeout: 600000
  planning_loop_timeout: 1200000
  implementation_loop_timeout: 3000000
  default_step: 300000
