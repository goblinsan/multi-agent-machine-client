<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Todos</title>
<style>
  :root { --bg: #f4f5f7; --card: #ffffff; --ink: #1f2430; --line: #e6e8ec; --brand: #3a6adf; }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); font-family: system-ui, sans-serif; color: #1f2430; }
  .app { max-width: 420px; margin: 48px auto; background: #fff; border: 1px solid #e6e8ec; border-radius: 12px; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .add { display: flex; gap: 8px; margin-bottom: 16px; }
  .add input { flex: 1; padding: 8px 10px; border: 1px solid #cbd0d6; border-radius: 8px; font-size: 14px; }
  .icon-btn { width: 36px; border: 0; border-radius: 8px; background: #3a6adf; color: #fff; cursor: pointer; }
  ul { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  li { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; }
  .muted { color: #cdd3da; font-size: 13px; margin-top: 16px; }
</style>
</head>
<body>
  <div class="app">
    <h1>Todos</h1>
    <div class="add">
      <input type="text" id="new-todo" placeholder="Add a todo" />
      <button class="icon-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 1v14M1 8h14" stroke="white" stroke-width="2"/></svg>
      </button>
    </div>
    <ul>
      <li><input type="checkbox" id="t1" /> Buy groceries</li>
      <li><input type="checkbox" id="t2" checked /> Walk the dog</li>
      <li><input type="checkbox" id="t3" /> Ship the release</li>
    </ul>
    <img src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" width="24" height="24" />
    <p class="muted">2 items left</p>
  </div>
</body>
</html>
